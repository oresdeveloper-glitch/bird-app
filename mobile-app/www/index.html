<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tanzania Bird Finder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a3a2a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui, sans-serif; color: #fff; flex-direction: column; gap: 20px; }
    .logo { width: 80px; height: 80px; border-radius: 20px; background: #2d5a3d; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    h1 { font-size: 20px; font-weight: 600; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,.15); border-top-color: #7ac48a; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (navigator.onLine) {
        window.location.href = 'https://orresydeveloper11-bird-app.hf.space';
      } else {
        document.getElementById('status').textContent = 'No internet connection';
      }
    });
  </script>
</head>
<body>
  <div class="logo">&#x1F426;</div>
  <h1>Tanzania Bird Finder</h1>
  <div class="spinner"></div>
  <p id="status" style="font-size:13px;opacity:.6;">Loading...</p>
</body>
</html>
