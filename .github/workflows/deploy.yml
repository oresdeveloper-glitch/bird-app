name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://ORRESYDEVELOPER11:$HF_TOKEN@huggingface.co/spaces/ORRESYDEVELOPER11/bird-app
          git push hf master --force 2>&1

      - name: Restart Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $HF_TOKEN" \
            https://huggingface.co/api/spaces/ORRESYDEVELOPER11/bird-app/restart
