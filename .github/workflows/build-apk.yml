name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: android-actions/setup-android@v3

      - name: Install SDK platform 36
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > mobile-app/android/local.properties

      - name: Install deps
        working-directory: mobile-app
        run: npm ci

      - name: Build APK
        working-directory: mobile-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace > $GITHUB_WORKSPACE/build.log 2>&1 || true

      - name: Read build log
        run: |
          echo "=== BUILD LOG ==="
          cat build.log
          echo "=== APK CHECK ==="
          ls -la mobile-app/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "APK DIR NOT FOUND"
          ls -la mobile-app/android/app/build/outputs/apk/ 2>/dev/null || echo "APK DIR NOT FOUND"
          echo "=== BUILD DIRS ==="
          find mobile-app/android -name "*.apk" 2>/dev/null || echo "NO APK FOUND"

      - uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - uses: actions/upload-artifact@v4
        with:
          name: birdfinder-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
