name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Android SDK and local.properties
        run: |
          SDK="/usr/local/lib/android/sdk"
          if [ ! -d "$SDK" ]; then
            SDK="$ANDROID_HOME"
          fi
          if [ ! -d "$SDK" ]; then
            echo "Android SDK not found, installing..."
            mkdir -p ~/android-sdk/cmdline-tools
            cd ~/android-sdk/cmdline-tools
            curl -sL -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools latest
            SDK=~/android-sdk
          fi
          echo "sdk.dir=$SDK" > mobile-app/android/local.properties
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -3
          $SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5

      - name: Install npm dependencies
        working-directory: mobile-app
        run: npm ci

      - name: Sync Capacitor Android
        working-directory: mobile-app
        run: npx cap sync android

      - name: Build APK
        working-directory: mobile-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: birdfinder-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
