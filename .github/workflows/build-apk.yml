name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Accept Android SDK licenses
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > mobile-app/android/local.properties
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -3
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" 2>&1 | tail -5

      - name: Install npm dependencies
        working-directory: mobile-app
        run: npm ci

      - name: Sync Capacitor Android
        working-directory: mobile-app
        run: npx cap sync android

      - name: Build APK
        working-directory: mobile-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: birdfinder-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
