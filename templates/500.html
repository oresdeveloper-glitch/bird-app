{% extends "base.html" %}
{% block title %}Server Error | Tanzania Bird Finder{% endblock %}
{% block content %}
<section class="section" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;">
  <div class="empty-state" style="max-width:480px;border-style:solid;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:64px;height:64px;opacity:0.4;">
      <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <h3>Something went wrong</h3>
    <p>Our bird identification engine encountered an unexpected issue. The team has been notified.</p>
    <div class="hero-actions" style="justify-content:center;margin-top:8px;">
      <a class="button primary" href="{{ url_for('index') }}">Return home</a>
      <a class="button secondary" href="{{ url_for('identify') }}">Try identify again</a>
    </div>
  </div>
</section>
{% endblock %}
